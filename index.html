<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>「争族」危険度＆資産最大化シミュレーション</title>
<style>
    body {
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        background-color: #f4f7f6;
        color: #333;
        line-height: 1.6;
        margin: 0;
        padding: 20px;
    }
    .container {
        max-width: 600px;
        margin: 0 auto;
        background: #fff;
        padding: 30px 20px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h2 {
        color: #2c3e50;
        text-align: center;
        font-size: 1.4rem;
        margin-top: 0;
        border-bottom: 2px solid #3498db;
        padding-bottom: 10px;
    }
    .form-group {
        margin-bottom: 25px;
    }
    label {
        display: block;
        font-weight: bold;
        margin-bottom: 10px;
        font-size: 1.1rem;
    }
    select {
        width: 100%;
        padding: 15px;
        font-size: 1.1rem;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-color: #fdfdfd;
        box-sizing: border-box;
    }
    .btn-submit {
        display: block;
        width: 100%;
        padding: 18px;
        background-color: #3498db;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1.3rem;
        font-weight: bold;
        cursor: pointer;
        text-align: center;
        transition: background 0.3s;
        margin-top: 30px;
    }
    .btn-submit:hover {
        background-color: #2980b9;
    }
    
    /* 結果画面（STEP2）のスタイル */
    #step2 {
        display: none;
        text-align: center;
    }
    .alert-box {
        background-color: #fff3cd;
        color: #856404;
        border: 1px solid #ffeeba;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 25px;
    }
    .danger-level {
        font-size: 1.8rem;
        color: #dc3545;
        font-weight: bold;
        margin: 10px 0;
    }
    .upside-box {
        background-color: #e8f4fd;
        border: 2px solid #3498db;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 30px;
    }
    .upside-amount {
        font-size: 2.2rem;
        color: #e74c3c;
        font-weight: bold;
    }
    .btn-form {
        display: block;
        width: 100%;
        padding: 20px;
        background-color: #e67e22;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1.2rem;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        box-sizing: border-box;
    }
    .btn-form:hover {
        background-color: #d35400;
    }
    .small-text {
        font-size: 0.9rem;
        color: #666;
        margin-top: 15px;
    }
</style>
</head>
<body>

<div class="container">
    <div id="step1">
        <h2>30秒でわかる！<br>「争族」危険度チェック</h2>
        <p style="text-align:center; font-size:1rem; color:#555;">親御さんのご資産について、ざっくりと教えてください。</p>
        
        <div class="form-group">
            <label for="heirs">1. 想定される相続人は何人ですか？</label>
            <select id="heirs">
                <option value="1">1人</option>
                <option value="2" selected>2人</option>
                <option value="3">3人</option>
                <option value="4">4人以上</option>
            </select>
        </div>

        <div class="form-group">
            <label for="realEstate">2. 不動産（ご自宅や土地）の概算価値は？</label>
            <select id="realEstate">
                <option value="3000">3,000万円未満</option>
                <option value="5000" selected>3,000万〜5,000万円</option>
                <option value="10000">5,000万〜1億円</option>
                <option value="30000">1億円〜3億円</option>
                <option value="50000">3億円以上</option>
            </select>
        </div>

        <div class="form-group">
            <label for="cash">3. 現金・預貯金の概算額は？</label>
            <select id="cash">
                <option value="500">500万円未満</option>
                <option value="1000">500万〜1,000万円</option>
                <option value="3000" selected>1,000万〜3,000万円</option>
                <option value="5000">3,000万〜5,000万円</option>
                <option value="10000">5,000万円以上</option>
            </select>
        </div>

        <button class="btn-submit" onclick="calculateResult()">危険度と対策効果を見る</button>
    </div>

    <div id="step2">
        <h2>簡易シミュレーション結果</h2>
        
        <div class="alert-box">
            <p style="margin:0; font-weight:bold;">不動産が分けられず揉める可能性</p>
            <div class="danger-level" id="dangerLevelText">争族危険度：高</div>
            <p id="dangerReason" style="font-size:0.95rem; text-align:left; margin-top:10px;"></p>
        </div>

        <div class="upside-box">
            <p style="margin-top:0; font-weight:bold; font-size:1.1rem;">弊社の【不動産×保険】対策プランなら…</p>
            <p style="font-size:1rem; margin-bottom:5px;">何もしない場合と比べて、手残り資産が</p>
            <div class="upside-amount">最大 約<span id="increaseAmount">--</span>万円</div>
            <p style="font-size:1.1rem; font-weight:bold; margin-bottom:0;">増える（守れる）可能性があります！</p>
        </div>

        <p style="font-size:1.05rem; font-weight:bold; color:#333; margin-bottom:15px;">
            あなたのご家庭に合わせた<br>詳しい対策レポートを無料でお送りします。
        </p>

        <a href="#" class="btn-form">詳しい計算結果を受け取る（無料）<br><span style="font-size:0.9rem; font-weight:normal;">※Googleフォームへ移動します</span></a>
        
        <p class="small-text">※上記は入力値に基づく概算の可能性であり、実際の税額や資産増減を保証するものではありません。</p>
    </div>
</div>

<script>
function calculateResult() {
    // 入力値の取得
    const heirs = parseInt(document.getElementById('heirs').value);
    const realEstate = parseInt(document.getElementById('realEstate').value);
    const cash = parseInt(document.getElementById('cash').value);
    
    // 総資産と不動産比率の計算
    const totalAssets = realEstate + cash;
    const realEstateRatio = realEstate / totalAssets;
    
    // ロジック1：危険度判定（兄弟が複数いて、不動産の比率が高い、または現金が少ないと危険）
    let dangerLevel = "低";
    let dangerReason = "現金が十分にあり、分割しやすい状態です。ただし、税金対策による資産増加の余地があります。";
    
    if (heirs > 1) {
        if (realEstateRatio > 0.6 || cash < 1000) {
            dangerLevel = "高";
            dangerReason = "財産に占める不動産の割合が高く、兄弟間で平等に分けるための現金（代償金）が不足し、揉める可能性が非常に高い状態です。";
        } else if (realEstateRatio > 0.4) {
            dangerLevel = "中";
            dangerReason = "不動産と現金のバランスに注意が必要です。事前の分割対策をしておかないと、納税資金がショートする恐れがあります。";
        }
    } else {
        dangerReason = "相続人がお一人のため分割で揉める心配はありませんが、多額の相続税が発生し、不動産を手放すリスクがあります。";
    }

    // ロジック2：資産増加のポテンシャル（デモ用のざっくり計算：総資産の10〜15%程度を提示）
    // ※実際の税理士業務の相場感に合わせてここは調整してください
    const increasePotential = Math.floor(totalAssets * 0.15);

    // 画面への値のセット
    document.getElementById('dangerLevelText').innerText = "争族危険度：" + dangerLevel;
    document.getElementById('dangerReason').innerText = dangerReason;
    document.getElementById('increaseAmount').innerText = increasePotential.toLocaleString();

    // 画面の切り替え
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
    
    // スムーズに上部へスクロール
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>

</body>
</html>
